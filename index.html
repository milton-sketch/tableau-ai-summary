<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Summary</title>
  <!-- Tableau Extensions API -->
  <script src="https://cdn.jsdelivr.net/npm/@tableau/extensions-api@1.12.0/lib/tableau.extensions.1.latest.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f8fa;
      padding: 16px;
      color: #1a1a2e;
    }

    #setup-screen, #main-screen { display: none; }
    #setup-screen.active, #main-screen.active { display: block; }

    /* ── Setup Screen ── */
    .setup-card {
      background: white;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      max-width: 480px;
      margin: 0 auto;
    }
    .setup-card h2 { font-size: 16px; margin-bottom: 6px; color: #1a1a2e; }
    .setup-card p  { font-size: 13px; color: #666; margin-bottom: 16px; }

    label { font-size: 12px; font-weight: 600; color: #444; display: block; margin-bottom: 4px; }
    input[type="password"], input[type="text"], select {
      width: 100%; padding: 9px 12px;
      border: 1px solid #ddd; border-radius: 6px;
      font-size: 13px; margin-bottom: 14px;
      outline: none; transition: border 0.2s;
    }
    input:focus, select:focus { border-color: #7c4dff; }

    .hint { font-size: 11px; color: #999; margin-top: -10px; margin-bottom: 14px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: 7px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary   { background: #7c4dff; color: white; width: 100%; justify-content: center; }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }
    .btn-secondary { background: #f0f0f5; color: #333; }
    .btn-secondary:hover:not(:disabled) { background: #e5e5ef; }
    .btn-icon      { background: none; border: none; padding: 4px; cursor: pointer; color: #888; }
    .btn-icon:hover { color: #333; }

    /* ── Main Screen ── */
    .toolbar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px; flex-wrap: wrap;
    }
    .toolbar select { width: auto; margin: 0; flex: 1; min-width: 140px; }
    .toolbar .spacer { flex: 1; }

    /* ── Summary Box ── */
    #summary-box {
      background: white; border-radius: 10px;
      padding: 16px 18px; min-height: 90px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      font-size: 13.5px; line-height: 1.7; color: #222;
      border-left: 4px solid #7c4dff;
      position: relative;
    }
    #summary-box.loading { color: #999; font-style: italic; }
    #summary-box.error   { border-left-color: #e53935; color: #c62828; }

    .summary-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .summary-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #7c4dff;
    }
    .summary-meta { font-size: 11px; color: #aaa; }

    /* ── Filter pills ── */
    #filter-pills {
      display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px;
    }
    .pill {
      background: #ede7ff; color: #5e35b1;
      font-size: 11px; padding: 3px 9px; border-radius: 20px;
      font-weight: 500;
    }

    /* ── Spinner ── */
    .spinner {
      width: 18px; height: 18px; border: 2px solid #ddd;
      border-top-color: #7c4dff; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Settings link ── */
    #settings-link {
      font-size: 11px; color: #aaa; cursor: pointer;
      text-decoration: underline; text-align: right;
      display: block; margin-top: 10px;
    }
    #settings-link:hover { color: #7c4dff; }
  </style>
</head>
<body>

<!-- ══════════════ SETUP SCREEN ══════════════ -->
<div id="setup-screen">
  <div class="setup-card">
    <h2>🤖 AI Summary — Setup</h2>
    <p>Configure your Anthropic API key and preferences. This is stored only in your browser.</p>

    <label>Gemini API Key</label>
    <input type="password" id="api-key-input" placeholder="AIza..." />
    <p class="hint">Get yours at aistudio.google.com → Get API Key</p>

    <label>Sheet to summarise</label>
    <select id="sheet-select-setup"><option>Loading sheets…</option></select>

    <label>Summary tone</label>
    <select id="tone-select">
      <option value="executive">Executive (brief, business-focused)</option>
      <option value="analyst">Analyst (detailed, data-driven)</option>
      <option value="friendly">Friendly (plain English)</option>
    </select>

    <button class="btn btn-primary" id="save-setup-btn">Save & Continue</button>
  </div>
</div>

<!-- ══════════════ MAIN SCREEN ══════════════ -->
<div id="main-screen">
  <div class="toolbar">
    <select id="sheet-select-main"></select>
    <button class="btn btn-primary" id="generate-btn">
      ✨ Generate Summary
    </button>
  </div>

  <div id="filter-pills"></div>

  <div id="summary-box">
    <div class="summary-header">
      <span class="summary-label">AI Summary</span>
      <span class="summary-meta" id="summary-meta"></span>
    </div>
    <div id="summary-text" style="color:#bbb; font-style:italic;">
      Select a sheet and click "Generate Summary" to begin.
    </div>
  </div>

  <a id="settings-link">⚙ Change settings</a>
</div>


<script>
  // ── State ──────────────────────────────────────────────
  let apiKey = "", tone = "executive", sheets = [];

  // ── Init ───────────────────────────────────────────────
  // If running outside Tableau (e.g. browser preview), show setup with mock data
  if (typeof tableau === "undefined" || !tableau.extensions) {
    showBrowserPreview();
  } else {
    tableau.extensions.initializeAsync({ configure: showSetup }).then(() => {
      sheets = tableau.extensions.dashboardContent.dashboard.worksheets;
      populateSheetDropdowns();

      const savedKey  = sessionStorage.getItem("ai_ext_key");
      const savedTone = sessionStorage.getItem("ai_ext_tone") || "executive";

      if (savedKey) {
        apiKey = savedKey; tone = savedTone;
        showMain();
      } else {
        showSetup();
      }
    }).catch(err => showError("Failed to init Tableau extension: " + err));
  }

  // ── Sheet dropdowns ────────────────────────────────────
  function populateSheetDropdowns() {
    [document.getElementById("sheet-select-setup"),
     document.getElementById("sheet-select-main")].forEach(sel => {
      sel.innerHTML = sheets.map(s =>
        `<option value="${s.name}">${s.name}</option>`).join("");
    });
  }

  // ── Screen switching ───────────────────────────────────
  function showSetup() {
    document.getElementById("setup-screen").classList.add("active");
    document.getElementById("main-screen").classList.remove("active");
    if (apiKey) document.getElementById("api-key-input").value = apiKey;
    document.getElementById("tone-select").value = tone;
  }
  function showMain() {
    document.getElementById("setup-screen").classList.remove("active");
    document.getElementById("main-screen").classList.add("active");
  }

  // ── Save setup ─────────────────────────────────────────
  document.getElementById("save-setup-btn").addEventListener("click", () => {
    const k = document.getElementById("api-key-input").value.trim();
    if (!k.startsWith("AIza")) return alert("Please enter a valid Gemini API key (starts with AIza).");
    apiKey = k; tone = document.getElementById("tone-select").value;
    sessionStorage.setItem("ai_ext_key", apiKey);
    sessionStorage.setItem("ai_ext_tone", tone);

    // Sync sheet selection
    const setupSheet = document.getElementById("sheet-select-setup").value;
    document.getElementById("sheet-select-main").value = setupSheet;
    showMain();
  });

  document.getElementById("settings-link").addEventListener("click", showSetup);

  // ── Generate Summary ───────────────────────────────────
  document.getElementById("generate-btn").addEventListener("click", generateSummary);

  async function generateSummary() {
    const btn     = document.getElementById("generate-btn");
    const box     = document.getElementById("summary-box");
    const textEl  = document.getElementById("summary-text");
    const metaEl  = document.getElementById("summary-meta");
    const pillsEl = document.getElementById("filter-pills");

    const sheetName = document.getElementById("sheet-select-main").value;
    const sheet = sheets.find(s => s.name === sheetName);
    if (!sheet) return;

    // Loading state
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Thinking…`;
    box.className = "loading";
    textEl.textContent = "Fetching dashboard data…";
    pillsEl.innerHTML  = "";
    metaEl.textContent = "";

    try {
      // 1. Get summary data
      const [summaryResult, filtersResult] = await Promise.all([
        sheet.getSummaryDataAsync({ maxRows: 500, ignoreSelection: false }),
        sheet.getFiltersAsync()
      ]);

      // 2. Build filter context
      const activeFilters = filtersResult
        .filter(f => {
          if (f.filterType === "categorical") return f.appliedValues?.length > 0 && !f.isAllSelected;
          return true;
        })
        .map(f => {
          if (f.filterType === "categorical")
            return `${f.fieldName}: ${f.appliedValues.map(v => v.formattedValue).join(", ")}`;
          if (f.filterType === "range")
            return `${f.fieldName}: ${f.minValue?.formattedValue} → ${f.maxValue?.formattedValue}`;
          return f.fieldName;
        });

      // Render filter pills
      pillsEl.innerHTML = activeFilters.length
        ? activeFilters.map(f => `<span class="pill">🔍 ${f}</span>`).join("")
        : `<span class="pill" style="background:#f0f0f0;color:#888;">No active filters</span>`;

      // 3. Serialize data rows (cap at 200 rows for prompt size)
      const cols = summaryResult.columns.map(c => c.fieldName);
      const rows = summaryResult.data.slice(0, 200).map(row =>
        row.map((cell, i) => `${cols[i]}: ${cell.formattedValue}`).join(" | ")
      );

      const toneInstructions = {
        executive: "Write 3-4 concise sentences for a senior executive. Focus on the most important business insight, top performers, and any critical issues. No jargon.",
        analyst:   "Write 4-5 sentences with a data-analyst perspective. Include specific numbers, highlight trends, outliers, and comparisons between segments.",
        friendly:  "Write 3-4 sentences in plain, friendly English that anyone can understand. Avoid technical terms and focus on what the data means in real-world terms."
      };

      const prompt = `You are summarising a Tableau dashboard worksheet called "${sheetName}".

Active filters: ${activeFilters.length ? activeFilters.join("; ") : "None"}

Data (${summaryResult.data.length} rows total, showing up to 200):
${rows.join("\n")}

${toneInstructions[tone]}
Respond with the summary only — no preamble, no markdown.`;

      // 4. Call Gemini API
      textEl.textContent = "Generating summary…";
      const resp = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }]
          })
        }
      );

      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.error?.message || "API error " + resp.status);
      }

      const result = await resp.json();
      const summary = result.candidates?.[0]?.content?.parts?.[0]?.text || "No summary returned.";

      // 5. Display
      box.className = "";
      textEl.textContent = summary;
      metaEl.textContent = `${summaryResult.data.length} rows · ${new Date().toLocaleTimeString()}`;

    } catch (err) {
      box.className = "error";
      textEl.textContent = "Error: " + err.message;
    } finally {
      btn.disabled = false;
      btn.innerHTML = "✨ Generate Summary";
    }
  }

  function showBrowserPreview() {
    // Mock a single sheet for browser testing
    sheets = [{ name: "Sheet 1 (Preview — not in Tableau)" }];
    populateSheetDropdowns();
    document.getElementById("setup-screen").classList.add("active");
    document.getElementById("api-key-input").placeholder = "sk-ant-... (enter your real key to test)";
  }

  function showError(msg) {
    document.getElementById("summary-box").className = "error";
    document.getElementById("summary-text").textContent = msg;
  }
</script>
</body>
</html>
